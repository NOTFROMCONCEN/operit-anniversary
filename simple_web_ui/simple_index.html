<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>纪念日管理</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233b7c82'/%3E%3Cpath d='M20 18h24a4 4 0 0 1 4 4v24a4 4 0 0 1-4 4H20a4 4 0 0 1-4-4V22a4 4 0 0 1 4-4Z' fill='%23fff'/%3E%3Cpath d='M22 28h20M22 36h12' stroke='%233b7c82' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: light;
      --blue: #2f8bd5;
      --blue-deep: #2179c4;
      --blue-soft: #e7f2fc;
      --orange: #ff8528;
      --orange-deep: #f17116;
      --red: #ff4356;
      --warn-soft: #ffe3e3;
      --ink: #2d2d2d;
      --muted: #8b8b8b;
      --line: #dedede;
      --page: #f1f1f1;
      --card: #ffffff;
      --tab: #aeb3b8;
      --shell-max: 1120px;
      --metric-width: 112px;
      font-family: Roboto, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background: #d9d9d9;
      color: var(--ink);
    }

    body { overflow-x: hidden; }

    button, input, select, textarea { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
      background: transparent;
    }

    .app {
      width: min(100%, var(--shell-max));
      min-height: 100svh;
      margin: 0 auto;
      padding: 0 0 28px;
      background: var(--page);
      box-shadow: 0 0 32px rgba(0, 0, 0, .18);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 4px rgba(0, 0, 0, .22);
    }

    .menu-icon,
    .top-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 22px;
      line-height: 1;
    }

    .top-icon.active {
      background: rgba(255, 255, 255, .16);
      border-radius: 4px;
    }

    .menu-icon span {
      width: 18px;
      height: 2px;
      display: block;
      background: currentColor;
      box-shadow: 0 -6px 0 currentColor, 0 6px 0 currentColor;
    }

    .title {
      min-width: 0;
      flex: 1;
    }

    .title h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title p {
      display: none;
    }

    .toolbar {
      display: flex;
      gap: 4px;
    }

    .btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      border: 1px solid #d1d1d1;
    }

    .btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: transparent;
    }

    .btn.danger {
      background: var(--warn-soft);
      color: #b34040;
      border-color: #f0c6c6;
    }

    .status-strip {
      height: 52px;
      display: flex;
      align-items: stretch;
      justify-content: space-around;
      padding: 0;
      background: #fff;
      border-bottom: 1px solid #ddd;
      color: var(--tab);
      font-size: 12px;
    }

    .status-strip > .tab-btn {
      min-width: 0;
      flex: 1;
      display: grid;
      place-items: center;
      border-bottom: 2px solid transparent;
      color: var(--tab);
      background: #fff;
    }

    .status-strip > .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .status-strip strong,
    #syncText,
    #todayText { display: none; }

    .dot {
      width: 22px;
      height: 22px;
      margin: 0;
      border-radius: 4px;
      display: inline-grid;
      place-items: center;
      background: transparent;
    }

    .dot::before {
      content: "23";
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 3px;
      background: currentColor;
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
    }

    .tab-btn[data-tab="context"]::before {
      content: "▣";
      font-size: 23px;
    }

    .tab-btn[data-tab="elapsed"]::before {
      content: "◷";
      font-size: 26px;
    }

    .tab-btn[data-tab="more"]::before {
      content: "•••";
      font-size: 22px;
      letter-spacing: 1px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px;
      background: #f8f8f8;
      border-bottom: 1px solid #dedede;
    }

    .search {
      min-height: 34px;
      width: 100%;
      padding: 0 10px;
      border-radius: 4px;
      border: 1px solid #d6d6d6;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .grid {
      display: block;
      padding: 0;
    }

    .grid.tile-mode {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
      gap: 8px;
      padding: 8px;
    }

    .card,
    .form-panel,
    .empty,
    .toast {
      background: var(--card);
    }

    .card {
      min-height: 42px;
      display: block;
      align-items: stretch;
      gap: 0;
      padding: 0;
      margin: 0;
      border-radius: 0;
      border-bottom: 1px solid #d8d8d8;
    }

    .grid.tile-mode .card {
      min-height: 118px;
      border: 1px solid #d7d7d7;
      border-radius: 4px;
      overflow: hidden;
    }

    .card-head {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--metric-width);
      align-items: center;
      padding: 0 0 0 10px;
      background: linear-gradient(#fff, #f8f8f8);
    }

    .grid.tile-mode .card-head {
      height: 100%;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 42px;
      align-items: stretch;
      padding: 10px 0 0;
    }

    .card-head > div {
      min-width: 0;
      padding-right: 8px;
    }

    .grid.tile-mode .card-head > div {
      padding: 0 10px;
    }

    .grid.tile-mode .switch {
      width: 100%;
      min-height: 42px;
      grid-template-columns: 1fr 36px;
    }

    .grid.tile-mode .card h2 {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .switch {
      width: var(--metric-width);
      height: auto;
      min-height: 42px;
      padding: 0;
      border-radius: 0;
      display: grid;
      grid-template-columns: 1fr 31px;
      background: var(--blue);
      color: #fff;
      border-left: 1px solid #1974bb;
      transition: none;
    }

    .switch span {
      width: auto;
      height: auto;
      border-radius: 0;
      background: var(--blue-deep);
      box-shadow: none;
      transition: none;
    }

    .switch.metric-elapsed {
      background: var(--orange);
      border-left-color: var(--orange-deep);
    }

    .switch.metric-elapsed span {
      background: var(--orange-deep);
    }

    .metric-number {
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }

    .metric-unit {
      display: grid;
      place-items: center;
      font-size: 17px;
      color: #fff;
    }

    .stats,
    .tags,
    .description,
    .card-actions {
      display: none;
    }

    .featured {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 110px;
      padding: 16px 14px;
      background: #fff;
      border-bottom: 1px solid #dadada;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .03);
    }

    .featured-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.18;
      font-weight: 500;
      color: #333;
      overflow-wrap: anywhere;
    }

    .featured-date {
      margin-top: 4px;
      color: #777;
      font-size: 15px;
    }

    .featured-value {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 150px;
      color: #333;
    }

    .featured-number {
      font-size: 48px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .featured-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      margin: 10px;
      padding: 28px 18px;
      border-radius: 6px;
      text-align: center;
      color: var(--muted);
      border: 1px solid #ddd;
    }

    .empty h2 {
      margin: 0 0 8px;
      color: var(--ink);
    }

    .form-wrap {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 14px;
      background: rgba(0, 0, 0, .32);
    }

    .form-wrap.open {
      display: grid;
    }

    .form-panel {
      width: min(640px, 100%);
      max-height: min(760px, calc(100svh - 44px));
      overflow: auto;
      padding: 16px;
      border-radius: 6px;
      background: #fff;
    }

    .form-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .form-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .fields {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .check-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafafa;
    }

    .form-actions {
      display: grid;
      grid-template-columns: auto 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    #deleteInFormBtn[hidden] {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 40;
      transform: translateX(-50%) translateY(16px);
      width: min(520px, calc(100% - 32px));
      padding: 12px 14px;
      color: var(--ink);
      border-radius: 6px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, .18);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .drawer-mask {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      background: rgba(0, 0, 0, .26);
    }

    .drawer-mask.open { display: block; }

    .drawer {
      position: fixed;
      z-index: 31;
      top: 0;
      bottom: 0;
      left: 0;
      width: min(320px, 82vw);
      transform: translateX(-100%);
      background: #fff;
      box-shadow: 8px 0 24px rgba(0, 0, 0, .22);
      transition: transform .2s ease;
    }

    .drawer.open {
      left: max(0px, calc((100vw - min(100vw, var(--shell-max))) / 2));
      transform: translateX(0);
    }

    .drawer-head {
      min-height: 112px;
      padding: 22px 18px;
      background: var(--blue);
      color: #fff;
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .drawer-head p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .82);
      font-size: 13px;
    }

    .drawer-actions {
      display: grid;
      gap: 1px;
      background: #e6e6e6;
    }

    .drawer-action {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #fff;
      color: #333;
      text-align: left;
    }

    .drawer-action small {
      color: var(--muted);
      font-size: 12px;
    }

    .more-menu {
      position: fixed;
      z-index: 32;
      right: max(14px, calc((100vw - min(100vw, var(--shell-max))) / 2 + 16px));
      top: 112px;
      width: min(220px, calc(100vw - 28px));
      display: none;
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .24);
    }

    .more-menu.open { display: block; }

    .more-menu button {
      width: 100%;
      min-height: 44px;
      display: block;
      padding: 0 14px;
      text-align: left;
      color: #333;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    .more-menu button:last-child {
      border-bottom: 0;
    }

    @media (max-width: 720px) {
      :root {
        --metric-width: 96px;
      }
      .app { width: 100%; box-shadow: none; }
      .field-row { grid-template-columns: 1fr; }
    }

    @media (min-width: 721px) {
      .topbar {
        height: 64px;
        padding-inline: 22px;
      }

      .title h1 {
        font-size: 22px;
      }

      .status-strip {
        height: 58px;
      }

      .filters {
        padding: 12px 16px;
      }

      .search {
        min-height: 42px;
        font-size: 17px;
      }

      .featured {
        min-height: 132px;
        padding: 24px 28px;
      }

      .featured-title {
        font-size: 30px;
      }

      .featured-date {
        font-size: 17px;
      }

      .featured-number {
        font-size: 64px;
      }

      .card {
        min-height: 52px;
      }

      .card-head {
        padding-left: 18px;
      }

      .card h2 {
        font-size: 20px;
      }

      .date {
        font-size: 14px;
      }

      .switch {
        min-height: 52px;
      }

      .metric-number {
        font-size: 23px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="menu-icon" id="menuBtn" type="button" aria-label="菜单"><span></span></button>
      <div class="title">
        <h1>Days Matter · 倒数日</h1>
        <p>统一管理本地纪念日数据，页面会跟随插件数据变化自动刷新。</p>
      </div>
      <div class="toolbar">
        <button class="top-icon" id="refreshBtn" type="button" title="切换视图" aria-label="切换视图">▦</button>
        <button class="top-icon" id="createBtn" type="button" title="添加纪念日" aria-label="添加纪念日">＋</button>
      </div>
    </header>

    <section class="status-strip" aria-live="polite">
      <button class="tab-btn active" data-tab="all" type="button" title="全部"><span class="dot" id="bridgeDot"></span><strong id="bridgeMode">初始化中</strong><span id="syncText">等待数据</span></button>
      <button class="tab-btn" data-tab="context" type="button" title="发送给 AI 上下文"><span id="todayText"></span></button>
      <button class="tab-btn" data-tab="elapsed" type="button" title="已发生"></button>
      <button class="tab-btn" data-tab="more" type="button" title="更多"></button>
    </section>

    <section class="filters">
      <input class="search" id="searchInput" type="search" placeholder="搜索名称、日期、备注" autocomplete="off" />
      <button class="btn" id="clearSearchBtn" type="button">清空</button>
    </section>

    <section id="featured"></section>
    <section class="grid" id="cards"></section>
  </main>

  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h2>Days Matter</h2>
      <p id="drawerSummary">纪念日实时同步中</p>
    </div>
    <div class="drawer-actions">
      <button class="drawer-action" type="button" data-menu-action="all"><span>全部纪念日</span><small id="allCount">0</small></button>
      <button class="drawer-action" type="button" data-menu-action="context"><span>发送给 AI</span><small id="contextCount">0</small></button>
      <button class="drawer-action" type="button" data-menu-action="elapsed"><span>已经发生</span><small id="elapsedCount">0</small></button>
      <button class="drawer-action" type="button" data-menu-action="refresh"><span>立即刷新</span><small>Sync</small></button>
    </div>
  </aside>

  <div class="more-menu" id="moreMenu">
    <button type="button" data-more-action="all">显示全部</button>
    <button type="button" data-more-action="context">只看上下文</button>
    <button type="button" data-more-action="elapsed">只看已发生</button>
    <button type="button" data-more-action="toggle-view">切换列表/宫格</button>
  </div>

  <section class="form-wrap" id="formWrap" aria-hidden="true">
    <form class="form-panel" id="entryForm">
      <div class="form-head">
        <h2 id="formTitle">添加纪念日</h2>
        <button class="btn" id="closeFormBtn" type="button" title="关闭">×</button>
      </div>
      <div class="fields">
        <input id="entryId" type="hidden" />
        <div class="field">
          <label for="titleInput">名称</label>
          <input id="titleInput" name="title" required maxlength="80" placeholder="例如：初次见面" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="dateInput">日期</label>
            <input id="dateInput" name="date" required placeholder="YYYY-MM-DD" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="ownerInput">归属</label>
            <select id="ownerInput" name="owner">
              <option value="user">用户</option>
              <option value="assistant">AI</option>
              <option value="shared">共同</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="modeInput">计数模式</label>
          <select id="modeInput" name="mode">
            <option value="both">双向</option>
            <option value="count_up">已过天数</option>
            <option value="count_down">倒计天数</option>
          </select>
        </div>
        <div class="field">
          <label for="descriptionInput">备注</label>
          <textarea id="descriptionInput" name="description" maxlength="600" placeholder="可选"></textarea>
        </div>
        <div class="check-row">
          <div>
            <strong>发送给 AI 上下文</strong>
            <div class="date">开启后，AI 对话会看到这个纪念日的实时状态。</div>
          </div>
          <input id="sendInput" name="sendToContext" type="checkbox" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn danger" id="deleteInFormBtn" type="button">删除</button>
        <button class="btn" id="cancelBtn" type="button">取消</button>
        <button class="btn primary" id="saveBtn" type="submit">保存</button>
      </div>
    </form>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    const POLL_MS = 2000;
    const STORE_KEY = "anniversary-webui-mock-data";

    const state = {
      snapshot: { success: true, today: "", version: "", count: 0, items: [] },
      query: "",
      editingVersion: "",
      pollTimer: 0,
      bridgeMode: "mock",
      busy: false,
      mutating: false,
      refreshNonce: 0,
      pendingRefresh: false,
      activeTab: "all",
      viewMode: "list",
      drawerOpen: false,
      moreOpen: false
    };

    const $ = (selector) => document.querySelector(selector);

    function pad2(n) {
      return n < 10 ? "0" + n : String(n);
    }

    function todayYMD() {
      const now = new Date();
      return `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
    }

    function isLeapYear(y) {
      return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
    }

    function parseYMD(date) {
      const parts = String(date || "").split("-");
      return { y: Number(parts[0]), m: Number(parts[1]), d: Number(parts[2]) };
    }

    function isValidYMD(date) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(String(date || ""))) return false;
      const p = parseYMD(date);
      if (!p.y || p.m < 1 || p.m > 12) return false;
      const days = [31, isLeapYear(p.y) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
      return p.d >= 1 && p.d <= days[p.m - 1];
    }

    function toDate(date) {
      const p = parseYMD(date);
      return new Date(p.y, p.m - 1, p.d, 0, 0, 0, 0);
    }

    function diffDays(from, to) {
      return Math.round((toDate(to).getTime() - toDate(from).getTime()) / 86400000);
    }

    function anniversaryDateInYear(base, year) {
      if (base.m === 2 && base.d === 29 && !isLeapYear(year)) return `${year}-02-28`;
      return `${year}-${pad2(base.m)}-${pad2(base.d)}`;
    }

    function nextOccurrence(baseDate, today) {
      const base = parseYMD(baseDate);
      const t = parseYMD(today);
      const current = anniversaryDateInYear(base, t.y);
      return diffDays(current, today) <= 0 ? current : anniversaryDateInYear(base, t.y + 1);
    }

    function calcStatus(baseDate, today) {
      const nextDate = nextOccurrence(baseDate, today);
      return {
        daysSince: diffDays(baseDate, today),
        nextDate,
        daysUntilNext: diffDays(today, nextDate),
        isToday: nextDate === today
      };
    }

    function hashText(text) {
      let h = 5381;
      const str = String(text || "");
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
      return h;
    }

    function buildVersion(items) {
      const list = Array.isArray(items) ? items : [];
      let active = 0;
      let maxStamp = "";
      let fingerprint = 0;
      for (const item of list) {
        if (!item.deleted) active++;
        const stamp = item.updatedAt || item.deletedAt || item.createdAt || "";
        if (stamp > maxStamp) maxStamp = stamp;
        fingerprint = (fingerprint + hashText([
          item.id, item.title, item.date, item.owner, item.mode,
          item.sendToContext ? "1" : "0", item.deleted ? "1" : "0",
          item.createdAt, item.updatedAt, item.deletedAt
        ].join("|"))) | 0;
      }
      return `mock:${list.length}:${active}:${maxStamp}:${fingerprint}`;
    }

    function makeId() {
      return `anniv_${todayYMD().replaceAll("-", "")}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function nowIso() {
      const now = new Date();
      return `${todayYMD()}T${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}+08:00`;
    }

    function loadMockItems() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_error) {}
      const seed = [{
        id: makeId(),
        title: "认识纪念日",
        date: "2026-07-03",
        calendarType: "solar",
        mode: "both",
        owner: "shared",
        description: "浏览器预览数据，不会写入 Operit 插件真实存储。",
        sendToContext: true,
        reminderEnabled: false,
        reminderDaysBefore: [],
        deleted: false,
        createdAt: nowIso(),
        updatedAt: nowIso()
      }];
      localStorage.setItem(STORE_KEY, JSON.stringify(seed));
      return seed;
    }

    function saveMockItems(items) {
      localStorage.setItem(STORE_KEY, JSON.stringify(items));
    }

    function mockSnapshot(params = {}) {
      const today = params.today || todayYMD();
      const all = loadMockItems();
      const visible = (params.includeDeleted ? all : all.filter(item => !item.deleted))
        .slice()
        .sort((a, b) => String(a.date).localeCompare(String(b.date)));
      return {
        success: true,
        today,
        version: buildVersion(all),
        count: visible.length,
        items: visible.map(item => ({
          ...item,
          status: calcStatus(item.date, today)
        }))
      };
    }

    function ensureExpectedVersion(params, items) {
      if (params.expectedVersion && params.expectedVersion !== buildVersion(items)) {
        return { success: false, error: { code: "DATA_CHANGED", message: "数据已变化，请刷新后重试" } };
      }
      return null;
    }

    const MockBridge = {
      async invoke(action, params = {}) {
        const items = loadMockItems();
        if (action === "list_snapshot") return mockSnapshot(params);
        if (action === "create") {
          const title = String(params.title || "").trim();
          const date = String(params.date || "").trim();
          if (!title) return { success: false, error: { code: "INVALID_TITLE", message: "请填写名称" } };
          if (!isValidYMD(date)) return { success: false, error: { code: "INVALID_DATE", message: "日期格式无效，请使用 YYYY-MM-DD" } };
          const item = {
            id: makeId(),
            title,
            date,
            calendarType: "solar",
            mode: ["count_up", "count_down", "both"].includes(params.mode) ? params.mode : "both",
            owner: ["user", "assistant", "shared"].includes(params.owner) ? params.owner : "user",
            description: String(params.description || ""),
            sendToContext: params.sendToContext === true,
            reminderEnabled: false,
            reminderDaysBefore: [],
            deleted: false,
            createdAt: nowIso(),
            updatedAt: nowIso()
          };
          items.push(item);
          saveMockItems(items);
          return { success: true, item, snapshot: mockSnapshot(params) };
        }
        if (action === "update") {
          const conflict = ensureExpectedVersion(params, items);
          if (conflict) return conflict;
          const item = items.find(entry => entry.id === params.id && !entry.deleted);
          if (!item) return { success: false, error: { code: "NOT_FOUND", message: "未找到对应的纪念日" } };
          const title = String(params.title || "").trim();
          const date = String(params.date || "").trim();
          if (!title) return { success: false, error: { code: "INVALID_TITLE", message: "请填写名称" } };
          if (!isValidYMD(date)) return { success: false, error: { code: "INVALID_DATE", message: "日期格式无效，请使用 YYYY-MM-DD" } };
          item.title = title;
          item.date = date;
          item.owner = params.owner;
          item.mode = params.mode;
          item.description = String(params.description || "");
          item.sendToContext = params.sendToContext === true;
          item.updatedAt = nowIso();
          saveMockItems(items);
          return { success: true, item, snapshot: mockSnapshot(params) };
        }
        if (action === "delete") {
          const conflict = ensureExpectedVersion(params, items);
          if (conflict) return conflict;
          const item = items.find(entry => entry.id === params.id && !entry.deleted);
          if (!item) return { success: false, error: { code: "NOT_FOUND", message: "未找到对应的纪念日" } };
          item.deleted = true;
          item.deletedAt = nowIso();
          item.updatedAt = item.deletedAt;
          saveMockItems(items);
          return { success: true, id: item.id, snapshot: mockSnapshot(params) };
        }
        if (action === "toggle_context") {
          const conflict = ensureExpectedVersion(params, items);
          if (conflict) return conflict;
          const item = items.find(entry => entry.id === params.id && !entry.deleted);
          if (!item) return { success: false, error: { code: "NOT_FOUND", message: "未找到对应的纪念日" } };
          item.sendToContext = params.enabled === true;
          item.updatedAt = nowIso();
          saveMockItems(items);
          return { success: true, id: item.id, sendToContext: item.sendToContext, snapshot: mockSnapshot(params) };
        }
        return { success: false, error: { code: "INVALID_ACTION", message: "未知动作" } };
      }
    };

    function resolveBridge() {
      const bridge = window.AnniversaryBridge || window.OperitAnniversaryBridge;
      if (bridge && typeof bridge.invoke === "function") {
        state.bridgeMode = "live";
        return bridge;
      }
      state.bridgeMode = "mock";
      return MockBridge;
    }

    async function invoke(action, params = {}) {
      const bridge = resolveBridge();
      const raw = await bridge.invoke(action, params);
      if (typeof raw === "string") {
        try { return JSON.parse(raw); } catch (_error) { return { success: false, error: { code: "BRIDGE_PARSE_FAILED", message: raw } }; }
      }
      return raw || { success: false, error: { code: "EMPTY_RESPONSE", message: "空响应" } };
    }

    function setBridgeStatus(kind, text) {
      $("#bridgeDot").className = `dot ${kind}`;
      $("#bridgeMode").textContent = state.bridgeMode === "live" ? "宿主实时数据" : "浏览器预览数据";
      $("#syncText").textContent = text;
    }

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 2600);
    }

    function ownerText(owner) {
      if (owner === "assistant") return "AI";
      if (owner === "shared") return "共同";
      return "用户";
    }

    function modeText(mode) {
      if (mode === "count_up") return "已过";
      if (mode === "count_down") return "倒计";
      return "双向";
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function filteredItems() {
      const query = state.query.trim().toLowerCase();
      let items = state.snapshot.items || [];
      if (state.activeTab === "context") {
        items = items.filter(item => item.sendToContext);
      } else if (state.activeTab === "elapsed") {
        items = items.filter(item => Number(item.status?.daysSince || 0) >= 0);
      }
      if (!query) return items;
      return items.filter(item => [
        item.title,
        item.date,
        item.description,
        ownerText(item.owner),
        modeText(item.mode)
      ].join(" ").toLowerCase().includes(query));
    }

    function makeEl(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function makeButton(label, className, action, id, title) {
      const button = makeEl("button", className, label);
      button.type = "button";
      if (action) button.dataset.action = action;
      if (id) button.dataset.id = id;
      if (title) button.title = title;
      return button;
    }

    function applySnapshot(snapshot, statusText) {
      state.snapshot = snapshot;
      render();
      setBridgeStatus(state.bridgeMode === "live" ? "live" : "mock", statusText);
    }

    function syncTopUi() {
      document.querySelectorAll(".tab-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === state.activeTab);
      });
      $("#refreshBtn").classList.toggle("active", state.viewMode === "tile");
      $("#cards").classList.toggle("tile-mode", state.viewMode === "tile");
      const items = state.snapshot.items || [];
      const contextCount = items.filter(item => item.sendToContext).length;
      const elapsedCount = items.filter(item => Number(item.status?.daysSince || 0) >= 0).length;
      $("#allCount").textContent = String(items.length);
      $("#contextCount").textContent = String(contextCount);
      $("#elapsedCount").textContent = String(elapsedCount);
      $("#drawerSummary").textContent = `${items.length} 个纪念日 · ${contextCount} 个发送给 AI`;
    }

    function setActiveTab(tab) {
      if (tab === "more") {
        toggleMoreMenu();
        return;
      }
      state.activeTab = tab || "all";
      state.moreOpen = false;
      syncOverlays();
      render();
    }

    function toggleViewMode() {
      state.viewMode = state.viewMode === "tile" ? "list" : "tile";
      render();
    }

    function syncOverlays() {
      $("#drawer").classList.toggle("open", state.drawerOpen);
      $("#drawer").setAttribute("aria-hidden", state.drawerOpen ? "false" : "true");
      $("#drawerMask").classList.toggle("open", state.drawerOpen);
      $("#moreMenu").classList.toggle("open", state.moreOpen);
    }

    function openDrawer() {
      state.drawerOpen = true;
      state.moreOpen = false;
      syncOverlays();
    }

    function closeDrawer() {
      state.drawerOpen = false;
      syncOverlays();
    }

    function toggleMoreMenu() {
      state.moreOpen = !state.moreOpen;
      state.drawerOpen = false;
      syncOverlays();
    }

    function metricForItem(item) {
      const status = item.status || {};
      const mode = item.mode || "both";
      const elapsed = mode === "count_up";
      if (elapsed) {
        return {
          value: Math.max(0, Number(status.daysSince || 0)),
          unit: "天",
          tone: "elapsed",
          prefix: item.title + " 已经",
          badge: "Days"
        };
      }
      return {
        value: Math.max(0, Number(status.daysUntilNext || 0)),
        unit: "天",
        tone: "upcoming",
        prefix: "距离" + item.title + "还有",
        badge: "Days"
      };
    }

    function renderFeatured(items) {
      const root = $("#featured");
      root.replaceChildren();
      if (!items.length) return;
      const item = items[0];
      const metric = metricForItem(item);
      const section = makeEl("section", "featured");
      section.dataset.action = "edit";
      section.dataset.id = item.id;
      const textBox = makeEl("div");
      textBox.append(
        makeEl("h2", "featured-title", metric.prefix),
        makeEl("div", "featured-date", `目标日: ${item.date || ""}`)
      );
      const valueBox = makeEl("div", "featured-value");
      valueBox.append(
        makeEl("span", "featured-number", String(metric.value)),
        makeEl("span", "featured-badge", metric.badge)
      );
      section.append(textBox, valueBox);
      root.append(section);
    }

    function makeMetricButton(item) {
      const metric = metricForItem(item);
      const button = makeButton("", `switch metric-${metric.tone}`, "toggle", item.id, "上下文发送开关");
      button.append(
        makeEl("span", "metric-number", String(metric.value)),
        makeEl("span", "metric-unit", metric.unit)
      );
      return button;
    }

    function render() {
      $("#todayText").textContent = state.snapshot.today ? `今天 ${state.snapshot.today}` : "";
      const root = $("#cards");
      const items = filteredItems();
      renderFeatured(items);
      root.replaceChildren();
      syncTopUi();
      if (!items.length) {
        const empty = makeEl("article", "empty");
        empty.append(
          makeEl("h2", "", state.query ? "没有匹配结果" : "暂无纪念日"),
          makeEl("p", "", state.query ? "换个关键词试试看。" : "添加第一个纪念日后，这里会显示实时天数。")
        );
        root.append(empty);
        return;
      }
      for (const item of items) {
        const metric = metricForItem(item);
        const card = makeEl("article", "card");
        card.dataset.action = "edit";
        card.dataset.id = item.id;
        const head = makeEl("div", "card-head");
        const titleBox = makeEl("div");
        titleBox.append(
          makeEl("h2", "", metric.prefix),
          makeEl("div", "date", `目标日: ${item.date || ""}`)
        );
        const switchButton = makeMetricButton(item);
        head.append(titleBox, switchButton);
        card.append(head);
        root.append(card);
      }
    }

    async function refresh(forceRender = false) {
      if (state.busy || state.mutating) {
        if (forceRender) state.pendingRefresh = true;
        return;
      }
      state.busy = true;
      const refreshToken = ++state.refreshNonce;
      try {
        const result = await invoke("list_snapshot", {});
        if (!result.success) throw new Error(result.error?.message || "读取失败");
        if (refreshToken !== state.refreshNonce || state.mutating) return;
        const changed = result.version !== state.snapshot.version;
        state.snapshot = result;
        setBridgeStatus(state.bridgeMode === "live" ? "live" : "mock", changed ? "已同步最新数据" : "数据无变化");
        if (changed || forceRender) render();
      } catch (error) {
        setBridgeStatus("error", error.message || "同步失败");
      } finally {
        state.busy = false;
        if (state.pendingRefresh && !state.mutating) {
          state.pendingRefresh = false;
          setTimeout(() => refresh(true), 0);
        }
      }
    }

    function openForm(item) {
      state.editingVersion = state.snapshot.version;
      $("#entryId").value = item?.id || "";
      $("#formTitle").textContent = item ? "编辑纪念日" : "添加纪念日";
      $("#titleInput").value = item?.title || "";
      $("#dateInput").value = item?.date || todayYMD();
      $("#ownerInput").value = item?.owner || "user";
      $("#modeInput").value = item?.mode || "both";
      $("#descriptionInput").value = item?.description || "";
      $("#sendInput").checked = item?.sendToContext === true;
      $("#deleteInFormBtn").hidden = !item;
      $("#formWrap").classList.add("open");
      $("#formWrap").setAttribute("aria-hidden", "false");
      $("#titleInput").focus();
    }

    function closeForm() {
      $("#formWrap").classList.remove("open");
      $("#formWrap").setAttribute("aria-hidden", "true");
      $("#entryForm").reset();
      $("#deleteInFormBtn").hidden = true;
      state.editingVersion = "";
    }

    function formPayload() {
      return {
        id: $("#entryId").value,
        title: $("#titleInput").value.trim(),
        date: $("#dateInput").value.trim(),
        owner: $("#ownerInput").value,
        mode: $("#modeInput").value,
        description: $("#descriptionInput").value,
        sendToContext: $("#sendInput").checked,
        expectedVersion: state.editingVersion
      };
    }

    async function saveForm(event) {
      event.preventDefault();
      const payload = formPayload();
      if (!payload.title) return toast("请填写名称");
      if (!isValidYMD(payload.date)) return toast("日期格式无效，请使用 YYYY-MM-DD");
      const action = payload.id ? "update" : "create";
      state.mutating = true;
      state.refreshNonce++;
      try {
        const result = await invoke(action, payload);
        if (!result.success) {
          toast(result.error?.message || "保存失败");
          if (result.error?.currentVersion) state.snapshot.version = result.error.currentVersion;
          return;
        }
        closeForm();
        if (result.snapshot) applySnapshot(result.snapshot, "保存完成");
      } finally {
        state.mutating = false;
        state.refreshNonce++;
        refresh(true);
      }
    }

    async function deleteCurrentEntry() {
      const id = $("#entryId").value;
      if (!id) return;
      const item = (state.snapshot.items || []).find(entry => entry.id === id);
      if (!item) return;
      if (!confirm(`确定删除「${item.title}」？`)) return;
      state.mutating = true;
      state.refreshNonce++;
      try {
        const result = await invoke("delete", { id, expectedVersion: state.editingVersion || state.snapshot.version });
        if (!result.success) {
          toast(result.error?.message || "删除失败");
          if (result.error?.currentVersion) state.snapshot.version = result.error.currentVersion;
          return;
        }
        closeForm();
        if (result.snapshot) applySnapshot(result.snapshot, "删除完成");
      } finally {
        state.mutating = false;
        state.refreshNonce++;
        refresh(true);
      }
    }

    async function handleCardClick(event) {
      const button = event.target.closest("button[data-action]");
      const target = button || event.target.closest("[data-action]");
      if (!target) return;
      const id = target.dataset.id;
      const item = (state.snapshot.items || []).find(entry => entry.id === id);
      if (!item) return;
      const action = target.dataset.action;
      if (action === "edit") {
        openForm(item);
        return;
      }
      if (action === "delete") {
        if (!confirm(`确定删除「${item.title}」？`)) return;
        state.mutating = true;
        state.refreshNonce++;
        try {
          const result = await invoke("delete", { id, expectedVersion: state.snapshot.version });
          if (!result.success) {
            toast(result.error?.message || "删除失败");
            if (result.error?.currentVersion) state.snapshot.version = result.error.currentVersion;
            return;
          }
          if (result.snapshot) applySnapshot(result.snapshot, "删除完成");
        } finally {
          state.mutating = false;
          state.refreshNonce++;
          refresh(true);
        }
        return;
      }
      if (action === "toggle") {
        state.mutating = true;
        state.refreshNonce++;
        try {
          const result = await invoke("toggle_context", {
            id,
            enabled: !item.sendToContext,
            expectedVersion: state.snapshot.version
          });
          if (!result.success) {
            toast(result.error?.message || "切换失败");
            if (result.error?.currentVersion) state.snapshot.version = result.error.currentVersion;
            return;
          }
          if (result.snapshot) applySnapshot(result.snapshot, "开关已更新");
        } finally {
          state.mutating = false;
          state.refreshNonce++;
          refresh(true);
        }
      }
    }

    function startPolling() {
      clearInterval(state.pollTimer);
      state.pollTimer = setInterval(() => {
        if (document.visibilityState === "visible") refresh(false);
      }, POLL_MS);
    }

    $("#createBtn").addEventListener("click", () => openForm(null));
    $("#refreshBtn").addEventListener("click", toggleViewMode);
    $("#menuBtn").addEventListener("click", openDrawer);
    $("#drawerMask").addEventListener("click", closeDrawer);
    $("#closeFormBtn").addEventListener("click", closeForm);
    $("#cancelBtn").addEventListener("click", closeForm);
    $("#deleteInFormBtn").addEventListener("click", deleteCurrentEntry);
    $("#entryForm").addEventListener("submit", saveForm);
    $("#cards").addEventListener("click", handleCardClick);
    $("#featured").addEventListener("click", handleCardClick);
    document.querySelectorAll(".tab-btn").forEach(button => {
      button.addEventListener("click", () => setActiveTab(button.dataset.tab));
    });
    $("#drawer").addEventListener("click", event => {
      const actionButton = event.target.closest("[data-menu-action]");
      if (!actionButton) return;
      const action = actionButton.dataset.menuAction;
      if (action === "refresh") {
        closeDrawer();
        refresh(true);
        return;
      }
      closeDrawer();
      setActiveTab(action);
    });
    $("#moreMenu").addEventListener("click", event => {
      const button = event.target.closest("[data-more-action]");
      if (!button) return;
      const action = button.dataset.moreAction;
      if (action === "toggle-view") {
        state.moreOpen = false;
        syncOverlays();
        toggleViewMode();
        return;
      }
      setActiveTab(action);
    });
    document.addEventListener("click", event => {
      if (!state.moreOpen) return;
      if (event.target.closest("#moreMenu") || event.target.closest('.tab-btn[data-tab="more"]')) return;
      state.moreOpen = false;
      syncOverlays();
    });
    $("#searchInput").addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });
    $("#clearSearchBtn").addEventListener("click", () => {
      state.query = "";
      $("#searchInput").value = "";
      render();
    });
    $("#formWrap").addEventListener("click", event => {
      if (event.target.id === "formWrap") closeForm();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") refresh(true);
    });

    window.AnniversaryWebUI = {
      refresh: () => refresh(true),
      setBridge(bridge) {
        window.AnniversaryBridge = bridge;
        return refresh(true);
      }
    };

    refresh(true);
    startPolling();
  </script>
</body>
</html>
